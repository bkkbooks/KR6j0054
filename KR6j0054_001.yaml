body:
  text: 西天譯經三藏朝奉大夫試光祿卿傳法大師賜紫臣施護譯爾時十方一切如來又復雲集勸請世尊金剛瑜伽大祕密主大毗盧遮那如來願説根本無性般若波羅蜜多法門爾時世尊金剛瑜伽大祕密主大毗盧遮那如來聞諸如來勸請言已即入一切佛境界大智金剛三摩地從是三摩地出已於剎那間安住一切如來及妙吉祥菩薩金剛真實智慧性中於是性中復入一切如來心光明妙堅固性智慧三摩地於是三摩地中從一切如來心出現一切佛境界光明遍照法界普及一切盡有情界悉皆照耀令一切有情智慧清淨從一切有情菩提心出生敬愛鉤召灌頂法如善所作如理安住金剛薩埵三摩地中所作圓滿又從寶光幢笑祕密大士出生最上大自在性安住金剛薩埵三摩地覺悟性中又從法利因語祕密大士出生堅固心所作清淨性安住蓮華薩埵三摩地自性清淨最上法性藏從是建立種種增上事業以護念法成熟有情從一切如來身語心乃至盡有情界普令成熟如理安住已還復世尊大毗盧遮那如來心隨入一切如來智慧性中住爾時世尊大毗盧遮那如來説伽陀曰大哉無漏因正慧一切如來所出生正慧無垢不思議衆生聚性所從來大哉諸法不思議一切佛事皆清淨若性無性分別時是心即於二處轉爾時妙吉祥菩薩摩訶薩即於會中現神通力從如來心化出十六大菩薩身圍繞世尊大毗盧遮那如來於一切如來左右現大日曼拏羅光明於其光中復現妙月曼拏羅妙吉祥菩薩處中而坐作如是言勸請世尊金剛瑜伽大祕密主大毗盧遮那如來宣説金剛場莊嚴般若波羅蜜多教諸正法句爾時世尊大毗盧遮那如來讚妙吉祥菩薩摩訶薩言善哉善哉妙吉祥汝能問佛如是正義汝當諦聽如善作意我今宣説是時世尊大毗盧遮那如來安住一切如來自在性中即説金剛場莊嚴般若波羅蜜多諸法大明句所謂四念處等四念處者於身中身內外隨觀行正念正知於受中受內外隨觀行正念正知於心中心內外隨觀行正念正知於法中法內外隨觀行正念正知如是身受心法四念處觀若正念正知即一切清淨住無著行乃於世間悉無所有而身語心常住般若波羅蜜多平等法門此名四念處平等法般若波羅蜜多教大明曰盎引一句岡引二唵引拶埵引哩娑蜜哩三合怛踰二合波塞他二合那引曩引三復次四正斷謂於未生諸不善法發起精進當令不生攝心正念已生諸不善法發起精進而悉令斷攝心正念未生諸善法發起精進悉令生長攝心正念已生諸善法發起精進悉令增長堅固廣大修習圓滿攝心正念如是四正斷即一切法不斷而斷是為覺了第一義諦此名正斷廣大門般若波羅蜜多教大明曰唵引一句三藐訖鉢囉三合賀引拏二薩哩嚩二合怛他引誐多三摩多引地瑟姹也二合三惡四囉五吽引六復次四神足謂欲三摩地斷行具足神足精進三摩地斷行具足神足心三摩地斷行具足神足慧三摩地斷行具足神足如是四神足從一切法如幻相出生是即轉一切法輪般若波羅蜜多第一義諦體門此名神足波羅蜜多平等智般若波羅蜜多教大明曰唵引一句哩提播引那播引囉彌帝引二羅嚩野囉吽引吽引三復次五根謂信根精進根念根定根慧根如是五根悉無戲論一切法平等性轉此名根平等般若波羅蜜多教大明曰唵引一句印捺哩二合引夜引嚩達鉢囉二合倪引二一試引惹那引摩三爹波誐多引野四阿引五唵引六復次五力謂信力精進力念力定力慧力如是五力即一切法平等行於一切力悉離戲論本來清淨此名力增般若波羅蜜多教大明曰唵引一句薩哩嚩二合怛他引誐多引末羅阿引二吽引吽引三嚩四復次七覺支謂念覺支擇法覺支精進覺支喜覺支輕安覺支定覺支捨覺支如是七法住平等性此名平等出生相般若波羅蜜多教大明曰唵引一句颯鉢多二合亭誐三摩多引二蘇鉢囉二合底瑟恥二合帝引三突籠二合引四鑁引五復次八正道謂正見正思惟正語正業正命正勤正念正知如是八法從大菩提心出生正道無盡而善覺了一切智智此名八正道平等般若波羅蜜多教大明曰唵引一句阿引哩也二合引瑟啖二合引仵引摩引哩誐二合摩引跓半音引二復次三三摩地謂空無相無願何名空三摩地謂若空相無所有相無自性相與一切法皆同一相是相無生此説名為空三摩地何名無相三摩地謂若於一切法無作相無希望無別異住寂靜相離相心止一境此説名為無相三摩地何名無願三摩地謂若苦無常相等於一切法無覺了性無起作若如是知若異如是知無求無行無希望此説名為無願三摩地如是三三摩地乃至一切性一切三摩地門隨入般若波羅蜜多門大明曰唵引一句朅三摩引薩哩嚩二合達哩摩二合引二亢引三復次八解脫謂有色觀諸色解脫內無色想觀外色解脫淨解脫復過諸色想不起礙想不作我想緣無邊空而作觀行即空無邊處解脫復過空無邊處緣無邊識而作觀行即識無邊處解脫復過識無邊處緣無所有處而作觀行即無所有處解脫復過無所有處緣非想非非想處而作觀行即非想非非想處解脫復過非想非非想處於想受滅三摩鉢底正觀行即想受滅解脫如是八法即一切法離戲論相非染非淨非定非散非三摩鉢底非非三摩鉢底此名離處非處般若波羅蜜多教大明曰唵引一句三滿多跋捺哩二合引二薩哩嚩二合婆引嚩尾戍提引三唐引四湯引五亢引六復次九次第定謂離欲諸惡不善法有尋有伺離生喜樂初禪定彼尋伺止息內心清淨住一境性無尋無伺定生喜樂二禪定於喜離著住捨念行身得妙樂離喜妙樂三禪定若苦若樂二法悉斷如先所起悅意惱意而皆止息無苦無樂捨念清淨四禪定過諸色想不起礙想於種種想而不作意緣無邊空而作觀行即空無邊處定過空無邊處緣無邊識而作觀行即識無邊處定過識無邊處緣無所有處而作觀行即無所有處定過無所有處緣非想非非想處而作觀行即非想非非想處定及想受滅定如是九法若有性若無性悉離分別即一切法無二覺了平等性此名一切解脫平等般若波羅蜜多教大明曰唵引一句阿難多尾謨引叉目珂舂二復次六念謂念佛念法念僧念捨念戒念天如是六法與一切法同一念即勝義空一切法同一相謂即無相是相亦離此名平等門三摩地名稱般若波羅蜜多教大明曰唵引一句薩哩嚩二合引耨娑蜜哩三合底二嚩朗二合引三唐引四桑引五鉢那引禰始六吽引吽引吽引七復次菩薩十分位謂發心分位童真分位初習業分位修行分位生貴分位相應具足分位正心分位不退轉分位得灌頂分位一生補處分位如是菩薩分位即非分位離諸分位入第一義安住一分位性一分位者即無分位此名無分位般若波羅蜜多教大明曰唵引一句薩哩嚩二合咩嚩娑他二合引那尾誐帝引吽引二復次菩薩十自在謂壽命自在業自在資具自在信解自在願自在神通自在出生自在力自在法自在心自在如是十自在即非自在自性離故乃得一切自在中最上寂靜一切法善住清淨性此名一切自在般若波羅蜜多教大明曰唵引一句薩哩嚩二合嚩始帝引二怛囕二合引三突籠二合引四吽引五復次十波羅蜜多謂布施波羅蜜多持戒波羅蜜多忍辱波羅蜜多精進波羅蜜多禪定波羅蜜多慧波羅蜜多方便波羅蜜多願波羅蜜多力波羅蜜多智波羅蜜多如是十波羅蜜多攝一切波羅蜜多是即無等等波羅蜜多離戲論波羅蜜多如實義波羅蜜多一切法真實義波羅蜜多金剛波羅蜜多寶波羅蜜多法波羅蜜多羯磨波羅蜜多一切法平等波羅蜜多如是等法而悉安住堅固隨順相應法門此名一切波羅蜜多平等般若波羅蜜多教大明曰唵引一句薩哩嚩二合播引囉彌多引哩他二合波哩布引囉尼二唵引三鉢囕二合引四吽引五當引六復次十地謂歡喜地離垢地發光地焰慧地難勝地現前地遠行地不動地善慧地法雲地如是十地即一切地而同一義所謂智義即此智義亦無所有無相無文字無聲無名不可記別本來清淨現無垢光住真實義此名地清淨般若波羅蜜多教大明曰唵引一句部彌尾秫馱儞二薩哩嚩二合引哩他二合波哩布囉尼三鑁引四蓬引五復次四梵行謂慈悲喜捨如是四法安住梵行此名一切法平等性般若波羅蜜多教大明曰唵引一句沒囉二合賀摩二合尾賀引囉阿地瑟姹二合那二岡引三𤚥引四訥籠二合引五叉六吽引七拏籠二合引八復次十力謂處非處智力業報智力種種界智力了別自他根智力種種信解智力苦滅道智力染淨智力宿住隨念智力五神通智力漏盡智力如是十力即一切如來平等善出生性此名十力平等般若波羅蜜多教大明曰唵引一句捺舍末羅摩帝引爽引二復次四無所畏謂如來應供正等正覺了知如是法成正等覺具一切智於一切世間天人魔梵沙門婆羅門等大衆中得無所畏平等觀察得大安樂行得勇猛行轉正法輪不轉一切世間之法又復如來了知如是法斷盡諸漏得無所畏又復如來説諸染法障礙聖道平等所説得無所畏又復如來作如是説修諸正行能盡諸苦平等所説得無所畏如是四法皆如實説正中正義即無所畏平等住一切法如幻相離我我所性此名無所畏平等般若波羅蜜多教大明曰唵引一句吠引舍引囉𭔞切身三摩多引鉢囉二合引鉢多二合二阿三阿引四暗引五惡六復次四無礙解謂詞無礙解法無礙解義無礙解樂説無礙解如是四法住平等性此名一切法如幻相無礙解般若波羅蜜多教大明曰唵引一句鉢囉二合底三尾那二莎入三吽引四復次十八不共法謂如來身無失語無失意無失無不定心無異想無不擇捨欲無減精進無減念無減慧無減解脫無減解脫知見無減過去無礙無著願知見轉未來無礙無著願知見轉現在無礙無著願知見轉身業隨智慧行語業隨智慧行意業隨智慧行如是十八法如來於一切時一切處一切平等而善安住即隨入一切法空性大慧清淨此名不共法平等般若波羅蜜多教大明曰唵引一句阿引尾引尼迦沒馱達哩摩二合三摩帝引二阿引三尾引囉吽引四亢引五爾時十方來者一切如來聞世尊大毗盧遮那如來宣説祕密諸法句已咸共稱讚説伽陀曰善哉無上菩提心一切如來勝自在善哉諸佛最上法是即三摩地名稱善哉金剛廣大智善住金剛堅固心善哉諸法無量門善住清淨第一義善説如是祕密句一切如來從是生爾時世尊大毗盧遮那如來歡喜歸命一切如來亦以伽陀而稱讚曰歸命頂禮諸如來自他清淨大法身我先歸命祕密言大力金剛堅固智諸法畢竟寂靜體安住金剛法性門已得圓滿大乘句歸命大悲大自在本來清淨大無畏最上最勝最第一信禮一切善逝尊最上正法諸文字以所宣説正法門普遍供養一切佛
